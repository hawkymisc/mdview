version: 2
updates:
  # ランタイム / 開発依存 (marked, @playwright/test 等)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Playwright のメジャー以外の更新は 1 PR にまとめる (頻繁に出るため)
      playwright:
        patterns:
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions 自体のバージョンも追跡 (actions/checkout, actions/setup-node 等)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
